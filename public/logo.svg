<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="crestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Shield/Crest Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Base Shield -->
    <path d="M 50 0 
             C 80 0, 100 10, 100 45 
             C 100 80, 75 95, 50 100 
             C 25 95, 0 80, 0 45 
             C 0 10, 20 0, 50 0 Z" 
          fill="url(#crestGrad)" 
          stroke="url(#goldGrad)" 
          stroke-width="3" />

    <!-- Gold Accent Inner Border -->
    <path d="M 50 6 
             C 75 6, 92 14, 92 43 
             C 92 73, 71 87, 50 92 
             C 29 87, 8 73, 8 43 
             C 8 14, 25 6, 50 6 Z" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="1" 
          opacity="0.6" />

    <!-- Open Book Icon (Gold) -->
    <g transform="translate(25, 28)" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left Page -->
      <path d="M 25 35 C 15 30, 5 32, 1 35 L 1 5 C 5 2, 15 0, 25 5 Z" fill="#ffffff" fill-opacity="0.1" />
      <!-- Right Page -->
      <path d="M 25 35 C 35 30, 45 32, 49 35 L 49 5 C 45 2, 35 0, 25 5 Z" fill="#ffffff" fill-opacity="0.1" />
    </g>

    <!-- Star/Crescent in Crest -->
    <path d="M 50 16 L 52 21 L 57 21 L 53 24 L 55 29 L 50 26 L 45 29 L 47 24 L 43 21 L 48 21 Z" fill="url(#goldGrad)" />
    
    <!-- Ribbons/Banner base -->
    <path d="M 20 85 L 80 85 L 75 92 L 25 92 Z" fill="#d97706" opacity="0.8" />
    <text x="50" y="91" font-family="system-ui, sans-serif" font-size="6" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">OBE</text>
  </g>

  <!-- Typography Group -->
  <g transform="translate(130, 0)">
    <!-- Main Branding Name -->
    <text x="0" y="52" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#1e1b4b" letter-spacing="-0.5">
      IQRA UNIVERSITY
    </text>
    
    <!-- Subtitle/Department -->
    <text x="0" y="76" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#4f46e5" letter-spacing="3.5">
      OBE MANAGEMENT SYSTEM
    </text>

    <!-- Decorative Gold Divider Line -->
    <line x1="0" y1="88" x2="250" y2="88" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
